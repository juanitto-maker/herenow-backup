<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>WorkClock — Time Tracker</title>
<meta name="description" content="Minimal project time tracker. Start/stop a clock per project. Data stays on your device.">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#0d1117">
<style>
:root,[data-theme="dark"]{
  --bg:#0d1117; --bg-card:#161b22; --bg-input:#0a0e13;
  --text:#c9d1d9; --text-m:#7d8590; --text-h:#e6edf3;
  --border:#21262d; --accent:#4ea1ff; --accent-dim:#1f3a5f;
  --green:#3fb950; --red:#f85149; --shadow:rgba(0,0,0,.4);
}
[data-theme="light"]{
  --bg:#f6f8fa; --bg-card:#fff; --bg-input:#f0f3f6;
  --text:#24292f; --text-m:#656d76; --text-h:#1f2328;
  --border:#d0d7de; --accent:#0969da; --accent-dim:#ddeeff;
  --green:#1a7f37; --red:#cf222e; --shadow:rgba(0,0,0,.08);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font:16px/1.5 -apple-system,Segoe UI,Roboto,sans-serif;
  min-height:100svh;padding:0 0 4rem}
header{display:flex;align-items:center;justify-content:space-between;
  padding:.9rem 1rem;border-bottom:1px solid var(--border);position:sticky;top:0;
  background:var(--bg);z-index:10}
header h1{font-size:1.05rem;color:var(--text-h);display:flex;align-items:center;gap:.5rem}
header h1 .dot{width:10px;height:10px;border-radius:50%;background:var(--accent)}
.hbtns{display:flex;gap:.5rem}
.icon-btn{background:var(--bg-card);border:1px solid var(--border);color:var(--text);
  border-radius:.5rem;padding:.4rem .7rem;font-size:.95rem;cursor:pointer}
main{max-width:560px;margin:0 auto;padding:1rem}
.empty{text-align:center;color:var(--text-m);padding:3rem 1rem;font-size:.92rem}
.empty .big{font-size:2.2rem;margin-bottom:.6rem}

/* project card */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:.8rem;
  padding:1rem;margin-bottom:.9rem;box-shadow:0 1px 4px var(--shadow)}
.card.running{border-color:var(--green)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:.6rem}
.card h2{font-size:1rem;color:var(--text-h)}
.card .client{font-size:.8rem;color:var(--text-m);margin-top:.1rem}
.meta-btn{background:none;border:none;color:var(--text-m);font-size:1.2rem;cursor:pointer;
  padding:.1rem .4rem;line-height:1}
.timer-row{display:flex;align-items:center;justify-content:space-between;margin-top:.9rem}
.time{font-size:2rem;font-weight:700;color:var(--text-h);font-variant-numeric:tabular-nums;
  letter-spacing:.02em}
.time small{font-size:1rem;font-weight:500;color:var(--text-m);margin:0 .15rem 0 .05rem}
.time.live{color:var(--green)}
.time .secs{font-size:.85rem;font-weight:500;color:var(--text-m);margin-left:.35rem}
.pulse{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--green);
  margin-right:.45rem;vertical-align:middle;animation:pul 1.2s ease-in-out infinite}
@keyframes pul{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.25;transform:scale(.7)}}
.btn{border:none;border-radius:.6rem;padding:.65rem 1.4rem;font-size:.95rem;font-weight:600;
  cursor:pointer;min-width:96px}
.btn-start{background:var(--accent);color:#fff}
.btn-stop{background:var(--red);color:#fff}
.since{font-size:.75rem;color:var(--green);margin-top:.35rem;min-height:1em}

/* details drawer */
.details{display:none;margin-top:.9rem;border-top:1px dashed var(--border);padding-top:.8rem;
  font-size:.85rem}
.details.open{display:block}
.details .row{display:flex;gap:.5rem;margin-bottom:.35rem;word-break:break-word}
.details .lbl{color:var(--text-m);min-width:84px;flex-shrink:0}
.details .acts{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;margin-top:.7rem}
.mini{background:var(--bg-input);border:1px solid var(--border);color:var(--text);
  border-radius:.45rem;padding:.45rem .3rem;font-size:.8rem;cursor:pointer;
  text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.adjust .mini,.adjust .chip{width:auto}
.mini.danger{color:var(--red);border-color:var(--red)}
.adjust{display:none;margin-top:.7rem;background:var(--bg-input);border:1px solid var(--border);
  border-radius:.5rem;padding:.6rem}
.adjust.open{display:block}
.chips{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.55rem}
.chip{background:var(--bg-card);border:1px solid var(--border);color:var(--text);
  border-radius:999px;padding:.3rem .7rem;font-size:.78rem;cursor:pointer}
.chip.neg{color:var(--red)}.chip.pos{color:var(--green)}
.adj-custom{display:flex;gap:.4rem;align-items:center}
.adj-custom input{width:70px;background:var(--bg-card);border:1px solid var(--border);
  border-radius:.4rem;color:var(--text);padding:.3rem .5rem;font-size:.82rem;text-align:center}
.adj-custom .lbl2{font-size:.75rem;color:var(--text-m)}

/* FAB */
.fab{position:fixed;right:1.1rem;bottom:1.3rem;width:58px;height:58px;border-radius:50%;
  background:var(--accent);color:#fff;border:none;font-size:1.9rem;cursor:pointer;
  box-shadow:0 4px 14px var(--shadow);z-index:20;line-height:1}

/* modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:50;
  align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.sheet{background:var(--bg-card);border:1px solid var(--border);border-bottom:none;
  border-radius:1rem 1rem 0 0;padding:1.2rem 1.2rem 1.6rem;width:100%;max-width:560px;
  max-height:88svh;overflow-y:auto}
.sheet h3{color:var(--text-h);font-size:1rem;margin-bottom:1rem}
.field{margin-bottom:.85rem}
.field label{display:block;font-size:.78rem;color:var(--text-m);margin-bottom:.3rem}
.field input,.field textarea{width:100%;background:var(--bg-input);border:1px solid var(--border);
  border-radius:.5rem;color:var(--text);padding:.6rem .7rem;font-size:.95rem;font-family:inherit}
.field textarea{min-height:72px;resize:vertical}
.field input:focus,.field textarea:focus{outline:none;border-color:var(--accent)}
.sheet-acts{display:flex;gap:.7rem;margin-top:1.1rem}
.sheet-acts .btn{flex:1}
.btn-ghost{background:var(--bg-input);color:var(--text);border:1px solid var(--border)}
.note{font-size:.72rem;color:var(--text-m);margin-top:.8rem;line-height:1.4}
footer{text-align:center;font-size:.72rem;color:var(--text-m);padding:1.5rem 1rem 0}
</style>
</head>
<body>
<header>
  <h1><span class="dot"></span>WorkClock</h1>
  <div class="hbtns">
    <button class="icon-btn" id="themeBtn" title="Theme">◐</button>
  </div>
</header>

<main>
  <div id="list"></div>
  <div class="empty" id="empty" style="display:none">
    <div class="big">⏱️</div>
    No projects yet.<br>Tap <strong>+</strong> to add your first project.
  </div>
  <footer>Data is stored only in this browser on this device (localStorage).</footer>
</main>

<button class="fab" id="addBtn" aria-label="Add project">+</button>

<!-- add/edit modal -->
<div class="overlay" id="modal">
  <div class="sheet">
    <h3 id="sheetTitle">New project</h3>
    <div class="field"><label>Project name *</label><input id="fName" maxlength="60" autocomplete="off"></div>
    <div class="field"><label>Client</label><input id="fClient" maxlength="60" autocomplete="off"></div>
    <div class="field"><label>Rate (€/h)</label><input id="fRate" inputmode="decimal" autocomplete="off"></div>
    <div class="field"><label>Credentials / links</label><textarea id="fCreds" placeholder="repo URL, login, dashboard link…"></textarea></div>
    <div class="field"><label>Notes</label><textarea id="fNotes"></textarea></div>
    <div class="sheet-acts">
      <button class="btn btn-ghost" id="cancelBtn">Cancel</button>
      <button class="btn btn-start" id="saveBtn">Save</button>
    </div>
    <div class="note">⚠️ Credentials are kept in plain localStorage — fine for links and low-risk info, use KeePassDX for real passwords.</div>
  </div>
</div>

<script>
const LS='workclock_projects', LST='workclock_theme';
let projects=JSON.parse(localStorage.getItem(LS)||'[]');
let editId=null;

/* theme */
const saved=localStorage.getItem(LST);
if(saved)document.documentElement.dataset.theme=saved;
else{const h=new Date().getHours();document.documentElement.dataset.theme=(h>=19||h<7)?'dark':'light';}
document.getElementById('themeBtn').onclick=()=>{
  const t=document.documentElement.dataset.theme==='dark'?'light':'dark';
  document.documentElement.dataset.theme=t;localStorage.setItem(LST,t);
};

function save(){localStorage.setItem(LS,JSON.stringify(projects));}
function fmt(ms){
  const m=Math.floor(ms/60000), h=Math.floor(m/60), mm=m%60;
  return `${h}<small>h</small>${String(mm).padStart(2,'0')}<small>m</small>`;
}
function secsPart(ms){return `<span class="secs">${String(Math.floor(ms/1000)%60).padStart(2,'0')}s</span>`;}
function earn(p){return p.rate?` · ≈€${((elapsed(p)/3600000)*parseFloat(p.rate)).toFixed(2)}`:'';}
function elapsed(p){return p.total+(p.runningSince?Date.now()-p.runningSince:0);}
function esc(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function render(){
  const list=document.getElementById('list');
  document.getElementById('empty').style.display=projects.length?'none':'block';
  list.innerHTML=projects.map(p=>{
    const run=!!p.runningSince;
    const since=run?`running since ${new Date(p.runningSince).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`:'';
    return `<div class="card ${run?'running':''}" data-id="${p.id}">
      <div class="card-top">
        <div><h2>${esc(p.name)}</h2><div class="client">${esc(p.client)||'&nbsp;'}</div></div>
        <button class="meta-btn" data-act="toggle-details">ⓘ</button>
      </div>
      <div class="timer-row">
        <div>
          <div class="time ${run?'live':''}">${run?'<span class="pulse"></span>':''}<span data-clock>${fmt(elapsed(p))}${secsPart(elapsed(p))}</span></div>
          <div class="since"><span>${since}</span><span data-earn>${run?earn(p):''}</span></div>
        </div>
        <button class="btn ${run?'btn-stop':'btn-start'}" data-act="startstop">${run?'Stop':'Start'}</button>
      </div>
      <div class="details" id="d-${p.id}">
        ${p.rate?`<div class="row"><span class="lbl">Rate</span><span>€${esc(p.rate)}/h · total${earn(p)||' ≈€0'}</span></div>`:''}
        ${p.creds?`<div class="row"><span class="lbl">Credentials</span><span>${esc(p.creds)}</span></div>`:''}
        ${p.notes?`<div class="row"><span class="lbl">Notes</span><span>${esc(p.notes)}</span></div>`:''}
        <div class="row"><span class="lbl">Created</span><span>${new Date(p.created).toLocaleDateString()}</span></div>
        <div class="acts">
          <button class="mini" data-act="edit">Edit</button>
          <button class="mini" data-act="adjust">± Adjust</button>
          <button class="mini" data-act="report">Report</button>
          <button class="mini" data-act="reset">Reset time</button>
          <button class="mini danger" data-act="delete">Delete</button>
        </div>
        <div class="adjust" id="a-${p.id}">
          <div class="chips">
            <button class="chip neg" data-act="adj" data-min="-60">−1h</button>
            <button class="chip neg" data-act="adj" data-min="-15">−15m</button>
            <button class="chip neg" data-act="adj" data-min="-5">−5m</button>
            <button class="chip pos" data-act="adj" data-min="5">+5m</button>
            <button class="chip pos" data-act="adj" data-min="15">+15m</button>
            <button class="chip pos" data-act="adj" data-min="60">+1h</button>
          </div>
          <div class="adj-custom">
            <input type="number" inputmode="numeric" placeholder="min" data-custom>
            <button class="chip neg" data-act="adjc" data-sign="-1">− apply</button>
            <button class="chip pos" data-act="adjc" data-sign="1">+ apply</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

/* tick — minute precision, refresh every 20s + on focus */
function tick(){
  document.querySelectorAll('.card.running').forEach(c=>{
    const p=projects.find(x=>x.id===c.dataset.id);
    if(!p||!p.runningSince)return;
    const e=elapsed(p);
    c.querySelector('[data-clock]').innerHTML=fmt(e)+secsPart(e);
    const er=c.querySelector('[data-earn]');if(er)er.textContent=earn(p);
  });
}
setInterval(tick,1000);
document.addEventListener('visibilitychange',()=>{if(!document.hidden)tick();});

function pad2(n){return String(n).padStart(2,'0');}
function fmtPlain(ms){const m=Math.floor(ms/60000);return Math.floor(m/60)+'h '+pad2(m%60)+'m';}
function dstr(d){d=new Date(d);return pad2(d.getDate())+'/'+pad2(d.getMonth()+1)+'/'+d.getFullYear();}
function downloadReport(p){
  const e=elapsed(p), now=new Date();
  const rate=parseFloat(p.rate)||0;
  const amount=rate?(e/3600000*rate):0;
  const L='==========================================';
  const l='------------------------------------------';
  let t=[];
  t.push(L,'  TIME REPORT',L,'');
  t.push('Project    : '+p.name);
  if(p.client)t.push('Client     : '+p.client);
  t.push('Period     : since '+dstr(p.created)+' (tracking start)');
  t.push('Generated  : '+dstr(now)+' '+pad2(now.getHours())+':'+pad2(now.getMinutes()));
  if(p.runningSince)t.push('Status     : timer still running (included up to generation time)');
  t.push('',l);
  t.push('Time worked : '+fmtPlain(e));
  if(rate){
    t.push('Hourly rate : EUR '+rate.toFixed(2)+'/h');
    t.push('Amount      : EUR '+amount.toFixed(2));
  }
  t.push(l,'');
  if(p.notes)t.push('Notes:',p.notes,'');
  t.push('Issued via WorkClock - digitalAIventures');
  const blob=new Blob([t.join('\n')],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  const safe=p.name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,40);
  a.download='report-'+safe+'-'+now.getFullYear()+pad2(now.getMonth()+1)+pad2(now.getDate())+'.txt';
  document.body.appendChild(a);a.click();
  setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},500);
}

function applyAdjust(p, minutes){
  p.total += minutes*60000;
  if(elapsed(p)<0) p.total = p.runningSince ? -(Date.now()-p.runningSince) : 0;
  save(); render();
  const d=document.getElementById('d-'+p.id), a=document.getElementById('a-'+p.id);
  if(d)d.classList.add('open'); if(a)a.classList.add('open');
}

/* event delegation */
document.getElementById('list').addEventListener('click',e=>{
  const btn=e.target.closest('[data-act]');if(!btn)return;
  const card=btn.closest('.card'), p=projects.find(x=>x.id===card.dataset.id);
  const act=btn.dataset.act;
  if(act==='startstop'){
    if(p.runningSince){p.total+=Date.now()-p.runningSince;p.runningSince=null;}
    else p.runningSince=Date.now();
    save();render();
  }else if(act==='toggle-details'){
    document.getElementById('d-'+p.id).classList.toggle('open');
  }else if(act==='edit'){
    editId=p.id;
    document.getElementById('sheetTitle').textContent='Edit project';
    fName.value=p.name;fClient.value=p.client||'';fRate.value=p.rate||'';
    fCreds.value=p.creds||'';fNotes.value=p.notes||'';
    document.getElementById('modal').classList.add('open');
  }else if(act==='report'){
    downloadReport(p);
  }else if(act==='adjust'){
    document.getElementById('a-'+p.id).classList.toggle('open');
  }else if(act==='adj'){
    applyAdjust(p, parseInt(btn.dataset.min,10));
  }else if(act==='adjc'){
    const inp=card.querySelector('[data-custom]');
    const v=parseInt(inp.value,10);
    if(!isNaN(v)&&v>0)applyAdjust(p, v*parseInt(btn.dataset.sign,10));
  }else if(act==='reset'){
    if(confirm('Reset accumulated time to 0h00m?')){p.total=0;p.runningSince=null;save();render();}
  }else if(act==='delete'){
    if(confirm(`Delete "${p.name}"? This cannot be undone.`)){
      projects=projects.filter(x=>x.id!==p.id);save();render();
    }
  }
});

/* add / modal */
const modal=document.getElementById('modal');
const fName=document.getElementById('fName'),fClient=document.getElementById('fClient'),
      fRate=document.getElementById('fRate'),fCreds=document.getElementById('fCreds'),
      fNotes=document.getElementById('fNotes');
document.getElementById('addBtn').onclick=()=>{
  editId=null;
  document.getElementById('sheetTitle').textContent='New project';
  fName.value=fClient.value=fRate.value=fCreds.value=fNotes.value='';
  modal.classList.add('open');fName.focus();
};
document.getElementById('cancelBtn').onclick=()=>modal.classList.remove('open');
modal.addEventListener('click',e=>{if(e.target===modal)modal.classList.remove('open');});
document.getElementById('saveBtn').onclick=()=>{
  const name=fName.value.trim();
  if(!name){fName.style.borderColor='var(--red)';return;}
  if(editId){
    const p=projects.find(x=>x.id===editId);
    Object.assign(p,{name,client:fClient.value.trim(),rate:fRate.value.trim(),
      creds:fCreds.value.trim(),notes:fNotes.value.trim()});
  }else{
    projects.unshift({id:'p'+Date.now().toString(36),name,client:fClient.value.trim(),
      rate:fRate.value.trim(),creds:fCreds.value.trim(),notes:fNotes.value.trim(),
      total:0,runningSince:null,created:Date.now()});
  }
  save();render();modal.classList.remove('open');
};

render();

/* PWA */
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
