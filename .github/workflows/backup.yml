name: here.now backup

on:
  schedule:
    - cron: '0 3 * * 0'   # Sundays 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write

env:
  HUB_SLUG: amber-kitten-4khe

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync slug list from hub
        run: |
          echo "Fetching hub..."
          if curl -sSf --retry 10 --retry-delay 6 --retry-all-errors \
              --max-time 30 -A "herenow-backup-bot/1.0" \
              -o /tmp/hub.html "https://${HUB_SLUG}.here.now/"; then
            echo "Hub fetched: $(wc -c < /tmp/hub.html) bytes"
            python3 <<'PY'
          import re, os, json
          HUB = os.environ['HUB_SLUG']
          with open('/tmp/hub.html') as f: html = f.read()
          pat = r'<a[^>]+href="https?://([a-z0-9-]+)\.here\.now/?"[^>]*>\s*([^<]+?)\s*</a>'
          pairs = re.findall(pat, html)
          seen = {HUB: 'Hub — all sites index'}
          for slug, title in pairs:
              if slug == HUB or slug in seen: continue
              seen[slug] = ' '.join(title.strip().split())
          with open('slugs.txt', 'w') as f:
              f.write('\n'.join(seen.keys()) + '\n')
          with open('/tmp/hub_titles.json', 'w') as f:
              json.dump(seen, f, ensure_ascii=False, indent=2)
          print(f"Synced {len(seen)} slugs from hub")
          PY
          else
            echo "::warning::Hub fetch failed — using existing slugs.txt as fallback"
            echo '{}' > /tmp/hub_titles.json
          fi

      - name: Backup all slugs
        run: |
          mkdir -p sites
          FAILED=()
          CHANGED=()
          OK=0
          TOTAL=0
          while IFS= read -r slug || [ -n "$slug" ]; do
            slug=$(echo "$slug" | tr -d '[:space:]')
            [ -z "$slug" ] && continue
            [[ "$slug" =~ ^# ]] && continue
            TOTAL=$((TOTAL+1))

            echo "::group::$slug"
            mkdir -p "sites/$slug"
            TMP=$(mktemp)

            if curl -sS -f \
                --retry 5 --retry-delay 10 --retry-all-errors \
                --max-time 60 -A "herenow-backup-bot/1.0" \
                -o "$TMP" "https://$slug.here.now/"; then
              if [ ! -f "sites/$slug/index.html" ] || ! cmp -s "$TMP" "sites/$slug/index.html"; then
                CHANGED+=("$slug")
              fi
              mv "$TMP" "sites/$slug/index.html"
              SIZE=$(wc -c < "sites/$slug/index.html")
              echo "✓ $slug ($SIZE bytes)"
              OK=$((OK+1))
            else
              rm -f "$TMP"
              echo "✗ $slug — FAILED after retries (keeping previous backup if any)"
              FAILED+=("$slug")
            fi
            echo "::endgroup::"
          done < slugs.txt

          echo ""
          echo "=== Summary ==="
          echo "OK:     $OK / $TOTAL"
          echo "Failed: ${#FAILED[@]} — ${FAILED[*]:-none}"
          date -u '+Last backup: %Y-%m-%d %H:%M UTC' > last-backup.txt

          echo "BACKUP_OK=$OK" >> "$GITHUB_ENV"
          echo "BACKUP_FAILED=${#FAILED[@]}" >> "$GITHUB_ENV"
          echo "BACKUP_DATE=$(date -u '+%Y-%m-%d')" >> "$GITHUB_ENV"
          echo "BACKUP_FAILED_SLUGS=${FAILED[*]:-none}" >> "$GITHUB_ENV"
          echo "CHANGED_SLUGS=${CHANGED[*]}" >> "$GITHUB_ENV"

      - name: Build titles.json
        run: |
          python3 <<'PY'
          import os, re, json
          with open('/tmp/hub_titles.json') as f:
              hub = json.load(f)
          with open('slugs.txt') as f:
              slugs = [l.strip() for l in f if l.strip() and not l.startswith('#')]
          out = {}
          for slug in slugs:
              entry = {'title': hub.get(slug, slug), 'ok': False}
              p = f'sites/{slug}/index.html'
              if os.path.exists(p) and os.path.getsize(p) > 0:
                  entry['ok'] = True
                  try:
                      with open(p, errors='replace') as f:
                          html = f.read(65536)
                      m = re.search(r'<title[^>]*>(.*?)</title>', html, re.I | re.S)
                      if m:
                          t = ' '.join(m.group(1).strip().split())
                          # Prefer HTML <title> over hub title if it's meaningful
                          if t and t.lower() != slug.lower() and len(t) > 3:
                              entry['title'] = t
                  except Exception as e:
                      print(f'  title extract failed for {slug}: {e}')
              out[slug] = entry
          with open('titles.json', 'w') as f:
              json.dump(out, f, ensure_ascii=False, indent=2)
          ok = sum(1 for v in out.values() if v['ok'])
          print(f'Wrote titles.json: {ok}/{len(out)} entries with backups')
          PY

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Backup $(date -u '+%Y-%m-%d')"
            git pull --rebase origin main
            git push
          fi

      - name: Create/update zip (full backup)
        run: |
          DATE=$(date -u '+%Y-%m-%d')
          ZIP="zips/herenow-backup-${DATE}.zip"

          # Always export the download URL (deterministic from date)
          echo "ZIP_URL=https://github.com/juanitto-maker/herenow-backup/raw/main/zips/herenow-backup-${DATE}.zip" >> "$GITHUB_ENV"

          # Skip if today's zip already exists and nothing changed
          if [ -f "$ZIP" ] && [ -z "$CHANGED_SLUGS" ]; then
            echo "No changes and zip already exists — skipping"
            echo "ZIPPED=false" >> "$GITHUB_ENV"
          else
            # Wipe all old zips (old dates, legacy names) then create fresh
            find zips/ -maxdepth 1 -type f -delete 2>/dev/null || true
            mkdir -p zips
            echo "Building ${ZIP}..."
            python3 <<'PY'
          import zipfile, json, os, datetime
          date = datetime.datetime.utcnow().strftime('%Y-%m-%d')
          zip_path = f'zips/herenow-backup-{date}.zip'
          now = datetime.datetime.utcnow()
          backup_date = now.strftime('%Y-%m-%d %H:%M UTC')
          repo = 'juanitto-maker/herenow-backup'
          pages_base = f'https://{repo.split("/")[0]}.github.io/{repo.split("/")[1]}'
          with open('titles.json') as f:
              titles = json.load(f)
          with open('slugs.txt') as f:
              slugs = [l.strip() for l in f if l.strip() and not l.startswith('#')]

          def human_size(b):
              for u in ['B','kB','MB']:
                  if b < 1024:
                      return f'{b:.1f} {u}' if u != 'B' else f'{b} {u}'
                  b /= 1024
              return f'{b:.1f} GB'

          sites = []
          total_bytes = 0
          for slug in slugs:
              html_path = f'sites/{slug}/index.html'
              entry = titles.get(slug, {})
              title = entry.get('title', slug) if isinstance(entry, dict) else slug
              ok = os.path.exists(html_path) and os.path.getsize(html_path) > 0
              size = os.path.getsize(html_path) if ok else 0
              if ok:
                  total_bytes += size
              sites.append({
                  'slug': slug,
                  'title': title,
                  'live_url': f'https://{slug}.here.now/',
                  'backup_url': f'{pages_base}/sites/{slug}/',
                  'file': f'sites/{slug}/index.html',
                  'size_bytes': size,
                  'size': human_size(size),
                  'ok': ok,
              })

          manifest = {
              'backup_date': backup_date,
              'repo': f'https://github.com/{repo}',
              'total_sites': len(sites),
              'backed_up': sum(1 for s in sites if s['ok']),
              'failed': sum(1 for s in sites if not s['ok']),
              'total_size': human_size(total_bytes),
              'total_size_bytes': total_bytes,
              'sites': sites,
          }

          os.makedirs('zips', exist_ok=True)
          with zipfile.ZipFile(zip_path, 'w', zipfile.ZIP_DEFLATED) as zf:
              for s in sites:
                  if s['ok']:
                      zf.write(f"sites/{s['slug']}/index.html",
                               f"herenow-backup/sites/{s['slug']}/index.html")
              zf.writestr('herenow-backup/manifest.json',
                          json.dumps(manifest, ensure_ascii=False, indent=2))
          print(f"Created {zip_path} with {manifest['backed_up']}/{manifest['total_sites']} sites")
          PY
            echo "ZIPPED=true" >> "$GITHUB_ENV"
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add zips/
          if git diff --staged --quiet; then
            echo "No zip changes to commit"
          else
            git commit -m "Zips $DATE"
            git pull --rebase origin main
            git push
          fi

      - name: Send Telegram notification
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 <<'PY'
          import json, os, urllib.request
          token = os.environ['TELEGRAM_BOT_TOKEN']
          chat_id = os.environ['TELEGRAM_CHAT_ID']
          date = os.environ.get('BACKUP_DATE', 'unknown')
          ok = os.environ.get('BACKUP_OK', '0')
          failed = os.environ.get('BACKUP_FAILED', '0')
          zipped = os.environ.get('ZIPPED', 'false')
          failed_slugs = os.environ.get('BACKUP_FAILED_SLUGS', 'none')
          zip_url = os.environ.get('ZIP_URL', 'https://github.com/juanitto-maker/herenow-backup/tree/main/zips')
          text = (
              f"\U0001f5c2 here.now Backup — {date}\n"
              f"✅ {ok} OK  ❌ {failed} failed\n"
              f"\U0001f4e6 zip updated: {zipped}\n"
              f"⚠️ Failed: {failed_slugs}\n"
              f"\U0001f517 {zip_url}"
          )
          payload = json.dumps({'chat_id': chat_id, 'text': text}).encode()
          req = urllib.request.Request(
              f'https://api.telegram.org/bot{token}/sendMessage',
              data=payload,
              headers={'Content-Type': 'application/json'},
          )
          with urllib.request.urlopen(req) as r:
              print(r.read().decode())
          PY

      - name: Send email notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "🗂 here.now Backup ${{ env.BACKUP_DATE }} — ${{ env.BACKUP_OK }} OK / ${{ env.BACKUP_FAILED }} failed"
          to: ${{ secrets.EMAIL_USERNAME }}
          from: ${{ secrets.EMAIL_USERNAME }}
          html_body: |
            <h2>&#x1F5C2; here.now Backup &mdash; ${{ env.BACKUP_DATE }}</h2>
            <p>&#x2705; <strong>${{ env.BACKUP_OK }} OK</strong> &nbsp;&nbsp; &#x274C; <strong>${{ env.BACKUP_FAILED }} failed</strong></p>
            <p>&#x1F4E6; zip updated: <strong>${{ env.ZIPPED }}</strong></p>
            <p>&#x26A0;&#xFE0F; Failed: ${{ env.BACKUP_FAILED_SLUGS }}</p>
            <p>&#x1F517; <a href="${{ env.ZIP_URL }}">⬇️ Download herenow-backup-${{ env.BACKUP_DATE }}.zip</a></p>
